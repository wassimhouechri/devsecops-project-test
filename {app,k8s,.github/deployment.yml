apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-app          # ← Ajout : crée un namespace dédié
  labels:
    app: flask-app
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000          # ← Changé : UID plus élevé (recommandé par Checkov)
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flask-app
          image: IMAGE_PLACEHOLDER   # Sera remplacé par SHA dans le pipeline
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: RATE_LIMIT
              value: "60"
            - name: RATE_WINDOW
              value: "60"
          # API_KEY monté en variable d'environnement (acceptable pour cet exemple)
          # Pour être 100% conforme : monter en volume secret
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: flask-app-secret
                key: api-key
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      imagePullSecrets:
        - name: ghcr-secret