name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devsecops-project
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety semgrep pip-licenses

      - name: Bandit — static code analysis
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --exclude app/tests,app/app_vulnerable.py
          echo "Bandit scan complete"

      - name: Safety CLI — check CVEs in dependencies
        run: |
          safety check \
            -r app/requirements.txt \
            --json \
            --output safety-report.json || true
          echo "Safety scan complete"

      - name: Semgrep — OWASP rules
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --json \
            --output semgrep-report.json \
            app/app.py || true
          echo "Semgrep scan complete"

      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: Licence check
        run: |
          pip install pip-licenses
          pip install -r app/requirements.txt --quiet
          pip-licenses --format=json --output-file=licenses-report.json

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
            licenses-report.json
          retention-days: 14

  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkov — IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          soft_fail: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Trivy — scan container
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start application container
        run: |
          docker run -d \
            --name test-app \
            -p 5000:5000 \
            -e API_KEY="zap-test-key" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for app to be healthy
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:5000/health; then
              echo "App is ready"
              break
            fi
            sleep 3
          done

      - name: OWASP ZAP — baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14

      - name: Stop test container
        if: always()
        run: docker stop test-app && docker rm test-app

  deploy:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [sast-scan, build-scan, dast-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply NetworkPolicy
        run: kubectl apply -f k8s/networkpolicy.yaml

      - name: Inject image SHA
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/flask-app --timeout=120s

      - name: Show status
        run: |
          kubectl get pods -l app=flask-app
          kubectl get svc flask-app-service