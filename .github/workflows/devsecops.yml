name: DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devsecops-project

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1 — Secrets + SAST + Licence check
  # Tools: Gitleaks, Bandit, Safety CLI, Semgrep, Hadolint
  # FIX: Actions pinned to SHA; Semgrep + Hadolint ajoutés
  # ─────────────────────────────────────────────────────────
  sast-scan:
    name: "Secrets & Static Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # pinned SHA — supply chain protection
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets in git history
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety semgrep

      - name: Bandit — static code analysis (Python)
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --exclude app/tests
          echo "Bandit scan complete"

      - name: Safety CLI — check known CVEs in dependencies
        run: |
          safety check \
            -r app/requirements.txt \
            --json \
            --output safety-report.json || true
          echo "Safety scan complete"

      - name: Semgrep — multi-language SAST & OWASP rules
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --json \
            --output semgrep-report.json \
            app/ || true
          echo "Semgrep scan complete"

      - name: Hadolint — Dockerfile lint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: Licence check — pip-licenses
        run: |
          pip install pip-licenses
          pip install -r app/requirements.txt --quiet
          pip-licenses --format=json --output-file=licenses-report.json
          echo "Licence check complete"

      - name: Upload SAST reports as artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
            licenses-report.json
          retention-days: 14

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Docker build + Trivy + Checkov IaC + Cosign
  # FIX: Checkov ajouté (IaC scan), image signée avec Cosign
  # ─────────────────────────────────────────────────────────
  build-scan:
    name: "Build & Container Security"
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write   # required for Cosign keyless signing

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkov — IaC scan (K8s manifests)
        uses: bridgecrewio/checkov-action@a2e977b32f5e7a4fe3a9a8d3e41be18e5f25424c # v12
        with:
          directory: k8s/
          framework: kubernetes
          output_format: json
          output_file_path: checkov-report.json
          soft_fail: false

      - name: Upload Checkov report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: checkov-report
          path: checkov-report.json
          retention-days: 14

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            ./app

      - name: Trivy — scan container for vulnerabilities
        uses: aquasecurity/trivy-action@18f2505d82aa3a6cf0eefa53f4c67274df67b5f2 # v0.29.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169 # v3.28.0
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image with Cosign (keyless, OIDC)
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "true"

  # ─────────────────────────────────────────────────────────
  # JOB 3 — Dynamic Application Security Testing
  # Tool: OWASP ZAP (baseline scan)
  # ─────────────────────────────────────────────────────────
  dast-scan:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start application container
        run: |
          docker run -d \
            --name test-app \
            -p 5000:5000 \
            -e API_KEY="zap-test-key" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in {1..15}; do
            if curl -sf http://localhost:5000/health; then
              echo "App is ready"
              break
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done

      - name: OWASP ZAP — baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"

      - name: Upload ZAP report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14

      - name: Stop and remove test container
        if: always()
        run: docker stop test-app && docker rm test-app

  # ─────────────────────────────────────────────────────────
  # JOB 4 — Deploy to Kubernetes
  # Only runs on main branch when all security jobs pass
  # FIX: NetworkPolicy et Secret appliqués avant le déploiement
  # ─────────────────────────────────────────────────────────
  deploy:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [sast-scan, build-scan, dast-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up kubectl
        uses: azure/setup-kubectl@3e0aec4d80787158d308d7b364cb1381784a5cf4 # v4.0.1
        with:
          version: "latest"

      - name: Configure kubectl with cluster credentials
        uses: azure/k8s-set-context@2f6bfda1e23e1a8cdfcfabc6627c0a1a83f5a7b4 # v4.0.1
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply NetworkPolicy (isolation réseau)
        run: kubectl apply -f k8s/networkpolicy.yaml

      - name: Inject image SHA into deployment manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" \
            k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/flask-app --timeout=120s

      - name: Verify image signature (Cosign)
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      - name: Show deployment status
        run: |
          echo "=== Pods ==="
          kubectl get pods -l app=flask-app
          echo "=== Service ==="
          kubectl get svc flask-app-service
          echo "=== NetworkPolicy ==="
          kubectl get networkpolicy flask-app-netpol
